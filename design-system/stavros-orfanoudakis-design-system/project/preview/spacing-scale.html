<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 28px 32px; display: flex; align-items: flex-end; gap: 14px; }
  .u {
    background: var(--paper-3);
    border-radius: var(--r-sm);
    border: 1px solid rgba(24,32,28,0.08);
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
  }
</style>
</head>
<body>
<div class="card">
  <div class="u" style="width:4px;height:24px;">—</div>
  <div class="u" style="width:8px;height:32px;">2</div>
  <div class="u" style="width:12px;height:40px;">3</div>
  <div class="u" style="width:16px;height:52px;">4</div>
  <div class="u" style="width:24px;height:64px;">5</div>
  <div class="u" style="width:32px;height:76px;">6</div>
  <div class="u" style="width:48px;height:88px;">7</div>
  <div class="u" style="width:64px;height:100px;">8</div>
  <div class="u" style="width:96px;height:112px;">9</div>
  <div class="u" style="width:128px;height:124px;">10</div>
</div>
</body>
</html>
