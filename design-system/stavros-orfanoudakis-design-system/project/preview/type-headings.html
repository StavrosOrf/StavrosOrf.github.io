<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 28px 32px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 20px; border-bottom: 1px solid var(--rule); padding-bottom: 10px; }
  .row:last-child { border: 0; padding-bottom: 0; }
  .label { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); width: 110px; flex-shrink: 0; letter-spacing: 0.02em; }
  .label b { color: var(--ink-2); font-weight: 600; }
  .sample { color: var(--ink-2); flex: 1; }
  .h1 { font-family: var(--font-display); font-size: 42px; font-weight: 600; line-height: 1.05; letter-spacing: -0.025em; font-variation-settings: "opsz" 96; }
  .h2 { font-family: var(--font-display); font-size: 30px; font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; }
  .h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; line-height: 1.2; letter-spacing: -0.01em; }
  .h4 { font-family: var(--font-display); font-size: 18px; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="row"><div class="label"><b>H1</b><br>60/1.1</div><div class="sample h1">Stavros Orfanoudakis</div></div>
  <div class="row"><div class="label"><b>H2</b><br>40/1.1</div><div class="sample h2">Selected publications</div></div>
  <div class="row"><div class="label"><b>H3</b><br>28/1.2</div><div class="sample h3">Research interests</div></div>
  <div class="row"><div class="label"><b>H4</b><br>22/1.3</div><div class="sample h4">Co-supervised MSc students</div></div>
</div>
</body>
</html>
