<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); font-family: var(--font-body); }
  .card { padding: 28px 32px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: var(--r-md); font-size: 14px; font-weight: 500; font-family: var(--font-body); cursor: pointer; border: 1px solid transparent; transition: all 140ms cubic-bezier(0.2,0.6,0.2,1); }
  .btn-primary { background: var(--grid-green); color: var(--paper); border-color: var(--grid-green); }
  .btn-primary:hover { background: #196a41; }
  .btn-secondary { background: var(--paper-2); color: var(--ink-2); border-color: var(--rule); }
  .btn-secondary:hover { background: var(--paper-3); }
  .btn-ghost { background: transparent; color: var(--ink-2); border-color: transparent; text-decoration: underline; text-underline-offset: 3px; text-decoration-color: rgba(24,32,28,0.3); }
  .btn-ghost:hover { text-decoration-color: var(--ink-2); }
  .btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; background: var(--paper-2); color: var(--ink-2); border-color: var(--rule); border-radius: var(--r-md); }
</style>
</head>
<body>
<div class="card">
  <button class="btn btn-primary">Read the paper</button>
  <button class="btn btn-secondary">View on arXiv</button>
  <button class="btn btn-ghost">Copy BibTeX</button>
  <button class="btn btn-icon" aria-label="GitHub" title="GitHub">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.2-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.3 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.1.9 2.3v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>
  </button>
  <button class="btn btn-icon" aria-label="PDF" title="PDF">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
  </button>
</div>
</body>
</html>
