<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); font-family: var(--font-body); }
  .card { padding: 24px 32px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .asset { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .frame { background: #fff; border: 1px solid var(--rule); border-radius: var(--r-sm); padding: 10px 14px; display: flex; align-items: center; justify-content: center; height: 64px; }
  .frame img { max-height: 44px; max-width: 160px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="card">
  <div class="asset">
    <div class="frame"><img src="../assets/ev2gym.png" alt="EV2Gym"></div>
    <div class="label">ev2gym.png</div>
  </div>
  <div class="asset">
    <div class="frame"><img src="../assets/drive2x.png" alt="DRIVE2X"></div>
    <div class="label">drive2x.png</div>
  </div>
  <div class="asset">
    <div class="frame"><img src="../assets/arxiv_logo.png" alt="arXiv"></div>
    <div class="label">arxiv_logo.png</div>
  </div>
  <div class="asset">
    <div class="frame"><img src="../assets/letter-s.png" alt="letter-s"></div>
    <div class="label">letter-s.png · favicon</div>
  </div>
</div>
</body>
</html>
