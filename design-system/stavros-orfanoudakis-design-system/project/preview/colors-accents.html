<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 28px 32px; }
  .row { display: flex; gap: 14px; }
  .swatch {
    flex: 1; height: 120px; border-radius: var(--r-md);
    border: 1px solid rgba(24,32,28,0.08);
    box-shadow: var(--sh-sm);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 12px 14px;
  }
  .swatch .top { font-family: var(--font-body); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
  .swatch .bottom { font-family: var(--font-mono); font-size: 11px; line-height: 1.3; }
  .swatch .bottom .name { font-weight: 600; }
  .swatch .bottom .hex { opacity: 0.8; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px;">Brand &amp; semantic accents</div>
  <div class="row">
    <div class="swatch" style="background:#1f7a4c;color:#f4f1e8;">
      <div class="top">Primary</div>
      <div class="bottom"><div class="name">grid-green</div><div class="hex">#1F7A4C · energy transition</div></div>
    </div>
    <div class="swatch" style="background:#2f9b62;color:#11140f;">
      <div class="top">Hover</div>
      <div class="bottom"><div class="name">grid-green-2</div><div class="hex">#2F9B62</div></div>
    </div>
    <div class="swatch" style="background:#d5e7dc;color:#1f7a4c;">
      <div class="top">Tint</div>
      <div class="bottom"><div class="name">grid-green-3</div><div class="hex">#D5E7DC</div></div>
    </div>
    <div class="swatch" style="background:#00539b;color:#f4f1e8;">
      <div class="top">Link</div>
      <div class="bottom"><div class="name">delft-blue</div><div class="hex">#00539B</div></div>
    </div>
    <div class="swatch" style="background:#b8861c;color:#18201c;">
      <div class="top">Notice</div>
      <div class="bottom"><div class="name">signal-amber</div><div class="hex">#B8861C</div></div>
    </div>
    <div class="swatch" style="background:#9a3b1f;color:#f4f1e8;">
      <div class="top">Alert</div>
      <div class="bottom"><div class="name">signal-rust</div><div class="hex">#9A3B1F</div></div>
    </div>
  </div>
</div>
</body>
</html>
