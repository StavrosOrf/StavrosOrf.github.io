<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); font-family: var(--font-body); }
  .card { padding: 24px 32px; display: flex; gap: 20px; align-items: center; background: var(--paper-2); border: 1px solid var(--rule); border-radius: var(--r-md); margin: 14px 32px; box-shadow: 0 1px 2px rgba(24,32,28,.06), 0 1px 3px rgba(24,32,28,.04); }
  .thumb { width: 180px; height: 110px; background: #fff; border: 1px solid var(--rule); border-radius: var(--r-md); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
  .thumb img { max-width: 90%; max-height: 80%; }
  .info h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink-2); margin: 0 0 6px; }
  .info p { font-size: 14px; line-height: 1.55; color: var(--ink); margin: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="thumb"><img src="../assets/ev2gym.png" alt="EV2Gym"></div>
  <div class="info">
    <h3>EV2Gym</h3>
    <p>A flexible simulation environment for EV smart charging research. Provides an OpenAI Gym interface for benchmarking reinforcement-learning solutions in the Vehicle-to-Grid domain.</p>
  </div>
</div>
</body>
</html>
