<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--paper); }
  .card { padding: 28px 32px; display: flex; gap: 16px; align-items: flex-end; }
  .box { background: var(--paper-2); border: 1px solid var(--rule); padding: 14px 18px; display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .sample { width: 72px; height: 56px; background: var(--ink-2); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); text-align: center; }
  .meta b { color: var(--ink-2); }
</style>
</head>
<body>
<div class="card">
  <div class="box"><div class="sample" style="border-radius:0;"></div><div class="meta"><b>r-none</b><br>0px</div></div>
  <div class="box"><div class="sample" style="border-radius:2px;"></div><div class="meta"><b>r-sm</b><br>2px · tags</div></div>
  <div class="box"><div class="sample" style="border-radius:4px;"></div><div class="meta"><b>r-md</b><br>4px · cards, buttons</div></div>
  <div class="box"><div class="sample" style="border-radius:8px;"></div><div class="meta"><b>r-lg</b><br>8px · surfaces</div></div>
  <div class="box"><div class="sample" style="border-radius:14px;"></div><div class="meta"><b>r-xl</b><br>14px · modals</div></div>
  <div class="box"><div class="sample" style="border-radius:999px;width:56px;"></div><div class="meta"><b>r-pill</b><br>full · badges</div></div>
</div>
</body>
</html>
